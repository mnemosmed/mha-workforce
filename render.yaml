services:
  - type: web
    name: mha-workforce-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PORTAL_USERNAME
        sync: false
      - key: PORTAL_PASSWORD
        sync: false
